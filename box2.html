<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

    .box {
        width:316px ;
        height:316px;
        /* background-color: aqua; */
        border: 1px solid red;
        }

        .sbox{
            width: 100px;
            height: 100px;
            display: inline-block;
    
        }

        #red {
         background-color: red;
        
        }

        #green {
            background-color: green;
            position: relative;
            top:100px
        }

        #blue {
            background-color: blue;
            position: relative;
            top:200px
        }
    </style>

</head>
<body>

    <div class="box">
        <div class="sbox" id="red"></div>
        <div class="sbox" id="green"></div>
        <div class="sbox" id="blue"></div>

    </div>  

</head>
